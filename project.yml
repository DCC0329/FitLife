name: FitLife
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
targets:
  FitLife:
    type: application
    platform: iOS
    sources:
      - FitLife
    settings:
      base:
        INFOPLIST_FILE: FitLife/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.FitLife
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
    entitlements:
      path: FitLife/FitLife.entitlements
      properties:
        com.apple.developer.healthkit: true
